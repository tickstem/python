name: Release

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --dev
      - run: uv run pytest --cov=tickstem --cov-report=term-missing --cov-fail-under=85

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: go-semantic-release/action@v1
        id: semrel
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - if: steps.semrel.outputs.version != ''
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - if: steps.semrel.outputs.version != ''
        run: |
          sed -i "s/__version__ = \".*\"/__version__ = \"${{ steps.semrel.outputs.version }}\"/" tickstem/_version.py
          uv build

      - if: steps.semrel.outputs.version != ''
        uses: pypa/gh-action-pypi-publish@release/v1
