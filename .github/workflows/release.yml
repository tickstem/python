name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --dev
      - run: uv run pytest --cov=tickstem --cov-report=term-missing --cov-fail-under=85

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/__version__ = \".*\"/__version__ = \"${VERSION}\"/" tickstem/_version.py
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
